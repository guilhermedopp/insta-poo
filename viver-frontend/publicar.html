<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVER+ - Partilhar Momento</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>

    <main class="tela-acesso" style="max-width: 650px; padding-bottom: 90px; justify-content: flex-start;">
        
        <header class="cabecalho-simples" style="margin-bottom: 30px; border-bottom: 2px solid var(--cor-borda); padding-bottom: 15px;">
            <h1 style="font-size: 2rem; color: var(--cor-azul);">Novo Momento</h1>
        </header>

        <section class="area-formulario" style="box-shadow: none; padding: 0;">
            <form id="form-publicar">
                <div class="grupo-input">
                    <label for="texto-post" style="font-size: 1.4rem; margin-bottom: 15px; display: block;">O que gostaria de partilhar hoje?</label>
                    <textarea id="texto-post" placeholder="Escreva aqui o seu pensamento, memória ou carinho..." required style="width: 100%; min-height: 180px; padding: 20px; font-size: 1.3rem; border: 3px solid var(--cor-borda); border-radius: 12px; font-family: Arial, sans-serif; resize: none; background-color: #fff;"></textarea>
                </div>
                
                <button type="submit" class="btn-primario btn-grande" id="btn-enviar" style="min-height: 65px; margin-top: 10px;">PUBLICAR</button>
            </form>
        </section>

        <nav class="barra-navegacao">
            <a href="feed.html" class="item-nav">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>Início</span>
            </a>
            
            <a href="#" class="item-nav" onclick="alert('Página de Mensagens em construção!')">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
                <span>Chat</span>
            </a>

            <a href="publicar.html" class="item-nav ativo">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <span>Publicar</span>
            </a>

            <a href="perfil.html" class="item-nav">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span>Perfil</span>
            </a>
        </nav>

    </main>

    <script>
        const API_URL = 'http://localhost:8080/api';
        const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));

        // Proteção: Se não estiver logado, volta para o login
        if (!usuarioLogado) {
            window.location.href = 'index.html';
        }

        // Submissão do novo post
        document.getElementById('form-publicar').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnEnviar = document.getElementById('btn-enviar');
            const campoTexto = document.getElementById('texto-post');
            const texto = campoTexto.value.trim();

            // Feedback visual de carregamento
            btnEnviar.textContent = 'A PUBLICAR...';
            btnEnviar.style.opacity = '0.7';
            btnEnviar.disabled = true;

            try {
                const resposta = await fetch(`${API_URL}/posts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        texto: texto,
                        autor: usuarioLogado
                    })
                });

                if (resposta.ok) {
                    // Sucesso! Redireciona de volta para o feed para ver a publicação
                    window.location.href = 'feed.html';
                } else {
                    const msgErro = await resposta.text();
                    alert(msgErro); // Mostra o alerta anti-fraude caso contenha links
                    btnEnviar.textContent = 'PUBLICAR';
                    btnEnviar.style.opacity = '1';
                    btnEnviar.disabled = false;
                }
            } catch (erro) {
                alert("Não foi possível publicar. Verifique a sua ligação.");
                btnEnviar.textContent = 'PUBLICAR';
                btnEnviar.style.opacity = '1';
                btnEnviar.disabled = false;
            }
        });
    </script>
</body>
</html>
